name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: gitmap
          POSTGRES_USER: gitmap_user
          POSTGRES_PASSWORD: gitmap_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U gitmap_user -d gitmap"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports: ["6379:6379"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: gitmap
          DB_USER: gitmap_user
          DB_PASSWORD: gitmap_pass
        run: python backend/manage.py migrate

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: gitmap
          DB_USER: gitmap_user
          DB_PASSWORD: gitmap_pass
        run: python backend/manage.py test -v 2
