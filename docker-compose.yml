services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gitmap-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/bge-m3:/app/bge-m3
    working_dir: /app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: gitmap
      DB_USER: gitmap_user
      DB_PASSWORD: gitmap_pass
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gitmap-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app:delegated
    working_dir: /app
    command: npm start
    stdin_open: true
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - FAST_REFRESH=false


  db:
    image: postgres:15
    container_name: db
    restart: always
    environment:
      POSTGRES_DB: gitmap
      POSTGRES_USER: gitmap_user
      POSTGRES_PASSWORD: gitmap_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db
    
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gitmap-celery
    command: celery -A gitmap_backend worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./backend/bge-m3:/app/bge-m3
    working_dir: /app
    depends_on:
      - backend
      - redis
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: gitmap
      DB_USER: gitmap_user
      DB_PASSWORD: gitmap_pass



volumes:
  pg_data:
